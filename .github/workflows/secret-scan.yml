name: Secret scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  current-tree:
    name: Scan checked-out source
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # This intentionally scans the checked-out tree while the known historical
      # incident remains in Git history. Switch to `gitleaks git` after the
      # separately reviewed history-remediation batch.
      - name: Run Gitleaks
        run: >-
          docker run --rm
          --volume "$GITHUB_WORKSPACE:/repo"
          --workdir /repo
          ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          dir --redact=100 --no-banner --exit-code 1 /repo
