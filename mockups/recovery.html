<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortixia Fit - Recovery Mockup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #050000;
            --card-bg: rgba(255, 0, 0, 0.03);
            --card-border: rgba(255, 0, 0, 0.1);
            --accent-red: #ff3333;
            --accent-glow: rgba(255, 51, 51, 0.4);
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 400px;
            background: radial-gradient(circle at 50% -10%, rgba(255, 51, 51, 0.15) 0%, var(--bg-color) 60%);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .title h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .refresh-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 15px var(--accent-glow);
            cursor: pointer;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .filter-btn.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: #fff;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Recovery List */
        .recovery-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 25px;
            backdrop-filter: blur(16px);
        }

        .muscle-item {
            margin-bottom: 24px;
        }

        .muscle-item:last-child {
            margin-bottom: 0;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            align-items: center;
        }

        .muscle-name {
            font-size: 18px;
            font-weight: 600;
        }

        .status {
            font-size: 14px;
            color: var(--text-muted);
        }

        .status.ready {
            color: var(--accent-red);
            font-weight: 600;
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* Progress Bars */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-red);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--accent-red);
            transition: width 1s ease-out;
        }

    </style>
</head>
<body>
    <div class="mobile-container">
        
        <header>
            <div class="title">
                <h1>Recovery</h1>
            </div>
            <div class="refresh-btn">⟳</div>
        </header>

        <div class="filters">
            <button class="filter-btn active">A → Z</button>
            <button class="filter-btn">Ready Soon</button>
        </div>

        <div class="recovery-card">
            
            <div class="muscle-item">
                <div class="item-header">
                    <span class="muscle-name">Arms</span>
                    <span class="status ready">Ready</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: 100%;"></div>
                </div>
            </div>

            <div class="muscle-item">
                <div class="item-header">
                    <span class="muscle-name">Back</span>
                    <span class="status">1d 7h remaining</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: 35%;"></div>
                </div>
            </div>

            <div class="muscle-item">
                <div class="item-header">
                    <span class="muscle-name">Chest</span>
                    <span class="status ready">Ready</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: 100%;"></div>
                </div>
            </div>

            <div class="muscle-item">
                <div class="item-header">
                    <span class="muscle-name">Core</span>
                    <span class="status">7h remaining</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: 80%;"></div>
                </div>
            </div>

            <div class="muscle-item">
                <div class="item-header">
                    <span class="muscle-name">Legs</span>
                    <span class="status ready">Ready</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: 100%;"></div>
                </div>
            </div>

        </div>

    </div>
</body>
</html>
